<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スマート支払い判定</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2230;
      --border:    #30363d;
      --border2:   #21262d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --accent2:   #1f6feb;
      --accent-bg: rgba(88,166,255,0.1);
      --ok:        #3fb950;
      --ok-bg:     rgba(63,185,80,0.1);
      --ok-border: rgba(63,185,80,0.3);
      --warn:      #d29922;
      --warn-bg:   rgba(210,153,34,0.1);
      --warn-border:rgba(210,153,34,0.3);
      --err:       #f85149;
      --err-bg:    rgba(248,81,73,0.1);
      --err-border:rgba(248,81,73,0.3);
      --maxw: 1100px;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Noto Sans JP', sans-serif;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100vh; overflow-x: hidden; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .wrap { position: relative; z-index: 1; width: min(100%, var(--maxw)); margin: 0 auto; padding: 32px 16px 64px; }

    /* ── Header ── */
    .header {
      padding: 40px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
      animation: slideDown 0.5s ease both;
    }
    .header-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    .header-eyebrow::before {
      content: ''; display: inline-block; width: 20px; height: 2px; background: var(--accent);
    }
    .header h1 {
      font-size: clamp(24px, 4vw, 36px); font-weight: 700;
      letter-spacing: -1px; line-height: 1.15; color: var(--text);
    }
    .header p { color: var(--muted); font-size: 14px; margin-top: 10px; max-width: 600px; line-height: 1.75; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(18px, 3vw, 28px);
      margin-bottom: 16px;
      animation: fadeUp 0.4s ease both;
    }
    .card:nth-child(2) { animation-delay: 0.05s; }
    .card:nth-child(3) { animation-delay: 0.10s; }
    .card:nth-child(4) { animation-delay: 0.15s; }

    .section-tag {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--accent);
      background: var(--accent-bg); border: 1px solid rgba(88,166,255,0.2);
      padding: 3px 10px; border-radius: 999px; margin-bottom: 18px;
    }

    h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text); letter-spacing: -0.2px; }
    .subdesc { color: var(--muted); font-size: 13px; line-height: 1.7; margin-bottom: 18px; }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 22px 0; }

    /* ── Grid ── */
    .grid   { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }

    @media (max-width: 820px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px) {
      .grid, .grid-2 { grid-template-columns: 1fr; }
      .coupon-row { grid-template-columns: 1fr; }
    }

    /* ── Fields ── */
    .field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.3px; }

    input, select {
      width: 100%; font-size: 15px; padding: 10px 13px;
      border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-family: inherit;
      appearance: none; -webkit-appearance: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="number"] { font-family: var(--mono); }
    input:focus, select:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }
    input::placeholder { color: var(--muted); opacity: 0.5; }

    /* ── Coupon row ── */
    .coupon-row {
      display: grid;
      grid-template-columns: minmax(0,1.4fr) minmax(0,1fr) minmax(88px,0.7fr);
      gap: 8px; width: 100%;
    }

    /* ── Buttons ── */
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 20px; }

    button {
      font-family: var(--sans); font-size: 14px; font-weight: 700;
      padding: 10px 20px; border-radius: 8px; border: none;
      cursor: pointer; white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    button:active { transform: scale(0.97); }

    button.primary {
      background: var(--accent); color: #0d1117;
      box-shadow: 0 0 20px rgba(88,166,255,0.2);
    }
    button.primary:hover { opacity: 0.9; box-shadow: 0 0 28px rgba(88,166,255,0.35); }

    button.secondary {
      background: var(--surface2); color: var(--muted);
      border: 1px solid var(--border);
    }
    button.secondary:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 480px) { .actions { flex-direction: column; } .actions button { width: 100%; } }

    /* ── Status ── */
    #statusArea { margin-top: 14px; }
    .status {
      border-radius: 8px; padding: 12px 16px; font-size: 13px; line-height: 1.6;
      border-left: 3px solid;
    }
    .status.ok  { background: var(--ok-bg);   color: var(--ok);   border-color: var(--ok); }
    .status.err { background: var(--err-bg);  color: var(--err);  border-color: var(--err); }

    /* ── Result ── */
    .result-placeholder { color: var(--muted); font-size: 14px; padding: 8px 0; }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-bottom: 20px;
    }
    @media (max-width: 580px) { .summary-strip { grid-template-columns: 1fr; } }

    .stat-block {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 10px; padding: 16px 18px;
      position: relative; overflow: hidden;
    }
    .stat-block::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(88,166,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .stat-block .stat-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .stat-block .stat-value { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -1px; }
    .stat-block .stat-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 680px) { .result-grid { grid-template-columns: 1fr; } }

    .result-panel {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 10px; overflow: hidden;
    }
    .result-panel-title {
      font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      color: var(--accent); padding: 12px 16px; border-bottom: 1px solid var(--border2);
      background: rgba(88,166,255,0.06);
    }

    /* ── Table ── */
    .table-wrap { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      padding: 8px 14px; border-bottom: 1px solid var(--border2);
      text-align: left; font-size: 11px; font-weight: 600;
      letter-spacing: 0.5px; color: var(--muted);
      background: transparent; white-space: nowrap;
    }
    td {
      padding: 9px 14px; border-bottom: 1px solid var(--border2);
      vertical-align: middle; overflow-wrap: anywhere;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(88,166,255,0.04); }
    .mono { font-family: var(--mono); font-size: 13px; }

    /* ── Test area ── */
    #testArea { font-size: 13px; line-height: 1.8; color: var(--muted); font-family: var(--mono); }

    /* ── Animations ── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes resultIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .result-animate { animation: resultIn 0.35s ease both; }

    /* ── Mode description ── */
    .mode-desc {
      font-size: 12px; color: var(--muted); line-height: 1.6;
      padding: 8px 12px; border-radius: 8px;
      background: var(--accent-bg); border: 1px solid rgba(88,166,255,0.15);
      margin-top: 2px;
      transition: opacity 0.2s ease;
    }

    /* ── Numpad ── */
    input[type="number"] { cursor: pointer; caret-color: transparent; user-select: none; }

    #numpad-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #numpad-overlay.open { opacity: 1; pointer-events: all; }

    #numpad {
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      overflow: hidden;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #numpad-overlay.open #numpad { transform: translateY(0); }

    .numpad-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
    }
    .numpad-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--accent); text-transform: uppercase; white-space: nowrap;
      flex-shrink: 0;
    }
    .numpad-display {
      font-family: var(--mono); font-size: 30px; font-weight: 600;
      color: var(--text); letter-spacing: -1px;
      flex: 1; text-align: right;
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .numpad-display.is-zero { color: var(--muted); }

    .numpad-keys {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--border2);
    }
    .nk {
      background: var(--surface2);
      font-family: var(--mono); font-size: 22px; font-weight: 500;
      color: var(--text); border: none; cursor: pointer;
      padding: 20px 0; text-align: center;
      transition: background 0.08s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .nk:active, .nk.pressed { background: var(--border); }
    .nk.nk-action { font-family: var(--sans); font-size: 14px; font-weight: 700; color: var(--muted); }
    .nk.nk-del    { font-size: 20px; color: var(--muted); }
    .nk.nk-ok     {
      background: var(--accent); color: #0d1117;
      font-family: var(--sans); font-size: 16px; font-weight: 700;
    }
    .nk.nk-ok:active { background: var(--accent2); }

  </style>
</head>
<body>
  <div class="wrap">

    <div class="header">
      <div class="header-eyebrow">Smart Payment Advisor</div>
      <h1>スマート支払い判定</h1>
      <p>財布の中からどのお金を出せば支払い後の枚数を最小にできるかを計算します。2000円札・値引き券・パーセント券にも対応。</p>
    </div>

    <!-- ─ Input Card ─ -->
    <div class="card">
      <div class="section-tag">Input</div>

      <div class="grid-2">
        <div class="field">
          <label for="price">支払額（円）</label>
          <input id="price" type="number" min="0" step="1" value="0" />
        </div>
        <div class="field">
          <label for="mode">評価モード</label>
          <select id="mode">
            <option value="coins">小銭を優先的に減らす</option>
            <option value="count">支払い後の枚数を最小</option>
          </select>
          <div id="modeDesc" class="mode-desc"></div>
        </div>
      </div>

      <div class="divider"></div>
      <h2>財布の中のお金</h2>
      <div class="grid" id="walletGrid"></div>

      <div class="divider"></div>
      <h2>クーポン券</h2>
      <p class="subdesc">値引き券（円）・パーセント券（%）を自由入力。パーセント券は残額に対して計算し小数点以下切り捨て。値引き券は残額を超える場合は使用不可。</p>
      <div class="grid" id="couponGrid"></div>

      <div class="actions">
        <button class="primary" id="calcBtn">&#x2713;&nbsp; 計算する</button>
        <button class="secondary" id="sampleBtn">サンプルを入れる</button>
        <button class="secondary" id="clearBtn">リセット</button>
      </div>
      <div id="statusArea"></div>
    </div>

    <!-- ─ Result Card ─ -->
    <div class="card">
      <div class="section-tag">Result</div>
      <div id="resultArea"><p class="result-placeholder">まだ計算していません。</p></div>
    </div>

    <!-- ─ Test Card (hidden / dev only) ─ -->
    <div style="display:none">
      <div id="testArea"></div>
    </div>


    <!-- ─ Numpad overlay ─ -->
    <div id="numpad-overlay">
      <div id="numpad">
        <div class="numpad-header">
          <span class="numpad-label" id="numpad-label">入力</span>
          <span class="numpad-display is-zero" id="numpad-display">0</span>
        </div>
        <div class="numpad-keys">
          <button class="nk" data-k="7">7</button>
          <button class="nk" data-k="8">8</button>
          <button class="nk" data-k="9">9</button>
          <button class="nk" data-k="4">4</button>
          <button class="nk" data-k="5">5</button>
          <button class="nk" data-k="6">6</button>
          <button class="nk" data-k="1">1</button>
          <button class="nk" data-k="2">2</button>
          <button class="nk" data-k="3">3</button>
          <button class="nk nk-action" data-k="clear">C</button>
          <button class="nk" data-k="0">0</button>
          <button class="nk nk-del" data-k="del">⌫</button>
        </div>
        <div class="numpad-keys" style="grid-template-columns:1fr; border-top:1px solid var(--border2);">
          <button class="nk nk-ok" data-k="ok">確定</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    'use strict';

    /* ─────────────────────────────────────────
       定数
    ───────────────────────────────────────── */
    const DENOMS        = [10000, 5000, 2000, 1000, 500, 100, 50, 10, 5, 1];
    const COIN_DENOMS   = [500, 100, 50, 10, 5, 1];
    const BILL_DENOMS   = [10000, 5000, 2000, 1000];
    const COUPON_ROWS   = 5;

    /* ─────────────────────────────────────────
       DOM refs（一括取得）
    ───────────────────────────────────────── */
    const $ = id => document.getElementById(id);
    const walletGrid  = $('walletGrid');
    const couponGrid  = $('couponGrid');
    const resultArea  = $('resultArea');
    const statusArea  = $('statusArea');
    const testArea    = $('testArea');

    /* ─────────────────────────────────────────
       ユーティリティ
    ───────────────────────────────────────── */
    // null/非オブジェクトをガード
    const toObj = v => (v && typeof v === 'object' && !Array.isArray(v)) ? v : {};
    const toArr = v => Array.isArray(v) ? v : [];

    // Object.values の安全版
    const objVals = v => {
      const o = toObj(v);
      return Object.keys(o).map(k => Number(o[k]) || 0);
    };

    // オブジェクト値の合計
    const sumVals = v => objVals(v).reduce((a, b) => a + b, 0);

    // 円表示
    const yen = n => Number(n || 0).toLocaleString('ja-JP') + '円';

    // 高速クローン（primitives/plain object のみ）
    const clone = o => structuredClone(o ?? {});

    /* ─────────────────────────────────────────
       財布・クーポン集計
    ───────────────────────────────────────── */
    const totalCount = w => sumVals(w);

    const totalAmount = w => {
      const s = toObj(w);
      return DENOMS.reduce((sum, d) => sum + d * (s[d] || 0), 0);
    };

    const totalCouponCount = cs => {
      if (Array.isArray(cs)) return cs.reduce((a, c) => a + (Number(c?.count) || 0), 0);
      return sumVals(cs);
    };

    // 硬貨・紙幣枚数
    const coinCount = w => { const s = toObj(w); return COIN_DENOMS.reduce((a, d) => a + (s[d] || 0), 0); };
    const billCount = w => { const s = toObj(w); return BILL_DENOMS.reduce((a, d) => a + (s[d] || 0), 0); };

    // 硬貨ペナルティ（小さい硬貨ほど重い）
    const coinPenalty = w => {
      const s = toObj(w);
      return (s[1]||0)*6 + (s[5]||0)*5 + (s[10]||0)*4 + (s[50]||0)*3 + (s[100]||0)*2 + (s[500]||0);
    };

    /* ─────────────────────────────────────────
       DOM 読み取り
    ───────────────────────────────────────── */
    /**
     * number input から非負整数を取得。
     * 不正値は 0 に正規化して input にも反映。
     */
    function readInt(el) {
      if (!el) return 0;
      const raw = el.value.trim();
      if (raw === '') { el.value = '0'; return 0; }
      const n = Number(raw);
      if (!Number.isFinite(n)) { el.value = '0'; return 0; }
      const v = Math.max(0, Math.floor(n));
      el.value = String(v);
      return v;
    }
    const readIntById = id => readInt($(id));

    function getWallet() {
      const w = {};
      for (const d of DENOMS) w[d] = readIntById(`d${d}`);
      return w;
    }

    function getCoupons() {
      const cs = [];
      for (let i = 0; i < COUPON_ROWS; i++) {
        const typeEl  = $(`couponType${i}`);
        const type    = typeEl ? typeEl.value : 'fixed';
        const value   = readIntById(`couponValue${i}`);
        const count   = readIntById(`couponCount${i}`);
        if (value > 0 && count > 0) cs.push({ id: i, type, value, count });
      }
      return cs;
    }

    /* ─────────────────────────────────────────
       UI 描画
    ───────────────────────────────────────── */
    function renderMoneyInputs(vals = {}) {
      const sv = toObj(vals);
      walletGrid.innerHTML = '';
      const frag = document.createDocumentFragment();
      for (const d of DENOMS) {
        const box = document.createElement('div');
        box.className = 'field';
        box.innerHTML = `
          <label for="d${d}">${d.toLocaleString('ja-JP')}円 × 枚数</label>
          <input id="d${d}" type="number" min="0" step="1" value="${sv[d] ?? 0}" />`;
        frag.appendChild(box);
      }
      walletGrid.appendChild(frag);
    }

    function renderCouponInputs(vals = []) {
      const sv = toArr(vals);
      couponGrid.innerHTML = '';
      const frag = document.createDocumentFragment();
      for (let i = 0; i < COUPON_ROWS; i++) {
        const row = sv[i] || { type: 'fixed', value: 0, count: 0 };
        const box = document.createElement('div');
        box.className = 'field';
        box.innerHTML = `
          <label>クーポン ${i + 1}</label>
          <div class="coupon-row">
            <select id="couponType${i}">
              <option value="fixed"${row.type === 'fixed' ? ' selected' : ''}>値引き券（円）</option>
              <option value="percent"${row.type === 'percent' ? ' selected' : ''}>パーセント券（%）</option>
            </select>
            <input id="couponValue${i}" type="number" min="0" step="1" value="${row.value ?? 0}" placeholder="額面/％" />
            <input id="couponCount${i}" type="number" min="0" step="1" value="${row.count ?? 0}" placeholder="枚数" />
          </div>`;
        frag.appendChild(box);
      }
      couponGrid.appendChild(frag);
    }

    function setStatus(msg, type = 'ok') {
      statusArea.innerHTML = `<div class="status ${type}">${msg}</div>`;
    }
    function clearStatus() { statusArea.innerHTML = ''; }

    /* ─────────────────────────────────────────
       お釣り計算（貪欲法）
    ───────────────────────────────────────── */
    function greedyChange(amount) {
      const out = {};
      let rem = Math.max(0, Math.floor(Number(amount) || 0));
      for (const d of DENOMS) {
        out[d] = Math.floor(rem / d);
        rem %= d;
      }
      return out;
    }

    /* ─────────────────────────────────────────
       支払い可能組み合わせ列挙（DP）
       ※ clone をコンボのコピー時のみに限定し、
         不要な Map エントリ再生成を排除
    ───────────────────────────────────────── */
    // countモード用: 使用枚数最小・高額紙幣優先
    function betterComboCount(a, b) {
      if (!a) return b;
      const ua = sumVals(a), ub = sumVals(b);
      if (ub !== ua) return ub < ua ? b : a;
      const ha = BILL_DENOMS.reduce((s, d) => s + (a[d] || 0), 0);
      const hb = BILL_DENOMS.reduce((s, d) => s + (b[d] || 0), 0);
      if (hb !== ha) return hb < ha ? b : a;
      return a;
    }

    // coinsモード用: 同金額なら「coinPenaltyが高い（小銭を多く使う）combo」を優先
    function betterComboCoins(a, b) {
      if (!a) return b;
      const pa = coinPenalty(a), pb = coinPenalty(b);
      if (pb !== pa) return pb > pa ? b : a;
      const ua = sumVals(a), ub = sumVals(b);
      if (ub !== ua) return ub < ua ? b : a;
      return a;
    }

    function enumerateReachable(available, mode) {
      const sa = toObj(available);
      // dp: amount → combo (各額面の枚数)
      const dp = new Map([[0, Object.fromEntries(DENOMS.map(d => [d, 0]))]]);
      // coinsモードは小銭を優先的に使うcomboを選ぶ
      const better = mode === 'coins' ? betterComboCoins : betterComboCount;

      for (const d of DENOMS) {
        const cnt = sa[d] || 0;
        if (!cnt) continue;
        // 現在の全エントリをスナップショット（イテレーション中の変更を避ける）
        const snap = [...dp.entries()];
        for (const [sum, combo] of snap) {
          for (let k = 1; k <= cnt; k++) {
            const ns = sum + d * k;
            const nc = clone(combo);
            nc[d] += k;
            dp.set(ns, better(dp.get(ns), nc));
          }
        }
      }
      return dp;
    }

    /* ─────────────────────────────────────────
       クーポン組み合わせ列挙
    ───────────────────────────────────────── */
    function enumerateCouponPlans(coupons, price) {
      const cs = toArr(coupons);
      const p0 = Math.max(0, Math.floor(Number(price) || 0));
      let plans = [{ discount: 0, usedCounts: new Array(cs.length).fill(0), applied: [] }];

      cs.forEach((coupon, idx) => {
        const next = [...plans];
        for (const base of plans) {
          let running = p0 - base.discount;
          if (running <= 0) continue;
          let add = 0;
          const entries = [];

          for (let k = 1; k <= (coupon.count || 0); k++) {
            let disc;
            if (coupon.type === 'fixed') {
              if ((coupon.value || 0) > running) break;
              disc = coupon.value;
            } else {
              disc = Math.floor(running * (coupon.value || 0) / 100);
              if (disc <= 0 || disc >= running) break;
            }
            add += disc;
            running -= disc;
            entries.push({ type: coupon.type, value: coupon.value, discount: disc });

            const usedCounts = [...base.usedCounts];
            usedCounts[idx] += k;  // k 枚使用した時点のプランを push
            next.push({
              discount: base.discount + add,
              usedCounts,
              applied: [...base.applied, ...entries.slice()]
            });
          }
        }

        // 重複排除
        const dedup = new Map();
        for (const plan of next) {
          const key = `${plan.discount}|${plan.usedCounts.join(',')}`;
          if (!dedup.has(key)) dedup.set(key, plan);
        }
        plans = [...dedup.values()].filter(p => p.discount <= p0);
      });

      return plans;
    }

    /* ─────────────────────────────────────────
       スコアリング・比較
    ───────────────────────────────────────── */
    function judgeCandidate(c, mode) {
      const afterW  = c.afterWallet;
      const changeC = c.changeCombo || {};
      const ac  = coinCount(afterW);
      const ab  = billCount(afterW);
      const acp = couponPenalty(c.afterCoupons);
      const atotal = ac + ab + acp;
      const paid   = sumVals(c.paidCombo) + (c.usedCounts || c.usedCouponCounts || []).reduce((a, b) => a + (b || 0), 0);
      // お釣りの総枚数をペナルティとして先頭に置く
      // → お釣りが少ない（出した額面がそのまま帰ってこない）支払い方を優先
      const changeCnt = Object.values(changeC).reduce((a, b) => a + (Number(b)||0), 0);

      return mode === 'coins'
        ? [changeCnt, coinPenalty(afterW), ac, atotal, c.paidAmount, totalAmount(afterW), paid]
        : [changeCnt, ac, coinPenalty(afterW), atotal, c.paidAmount, totalAmount(afterW), paid];
    }

    function couponPenalty(cs) { return totalCouponCount(cs); }

    function compareTuple(a, b) {
      const len = Math.max(a.length, b.length);
      for (let i = 0; i < len; i++) {
        const d = (a[i] ?? 0) - (b[i] ?? 0);
        if (d !== 0) return d;
      }
      return 0;
    }

    /* ─────────────────────────────────────────
       最適解探索
    ───────────────────────────────────────── */
    function findBest(wallet, coupons, price, mode) {
      const sw    = toObj(wallet);
      const sc    = toArr(coupons);
      const p     = Math.max(0, Math.floor(Number(price) || 0));
      const md    = mode === 'coins' ? 'coins' : 'count';
      const moneyDp     = enumerateReachable(sw, md);
      const couponPlans = enumerateCouponPlans(sc, p);

      let best = null, bestScore = null;

      for (const plan of couponPlans) {
        const rem = p - plan.discount;
        for (const [paid, paidCombo] of moneyDp) {
          if (paid < rem) continue;
          const change      = paid - rem;
          const changeCombo = greedyChange(change);
          const afterWallet = walletAfter(sw, paidCombo, changeCombo);
          const afterCoupons = couponsAfter(sc, plan.usedCounts);

          const cand = {
            couponAmount: plan.discount,
            usedCounts:   plan.usedCounts,
            applied:      plan.applied,
            remainingPrice: rem,
            paidAmount:   paid,
            paidCombo,
            changeAmount: change,
            changeCombo,
            afterWallet,
            afterCoupons
          };
          const score = judgeCandidate(cand, md);
          if (!best || compareTuple(score, bestScore) < 0) {
            best = cand; bestScore = score;
          }
        }
      }
      return best;
    }

    function walletAfter(w, paid, change) {
      const sw = toObj(w), sp = toObj(paid), sc = toObj(change);
      const next = {};
      for (const d of DENOMS) next[d] = (sw[d]||0) - (sp[d]||0) + (sc[d]||0);
      return next;
    }

    function couponsAfter(cs, usedCounts) {
      return toArr(cs).map((c, i) => ({ ...c, count: Math.max(0, (c.count||0) - (usedCounts[i]||0)) }));
    }

    /* ─────────────────────────────────────────
       結果描画
    ───────────────────────────────────────── */
    function compactCombo(combo, denoms) {
      const sc = toObj(combo);
      return denoms.filter(d => (sc[d]||0) > 0).map(d => `${d.toLocaleString('ja-JP')}円×${sc[d]}`).join('　') || 'なし';
    }

    function describeApplied(applied) {
      const sa = toArr(applied);
      if (!sa.length) return 'なし';
      return sa.map(c => c.type === 'fixed'
        ? `${Number(c.value||0).toLocaleString('ja-JP')}円値引き`
        : `${Number(c.value||0).toLocaleString('ja-JP')}%OFF（${Number(c.discount||0).toLocaleString('ja-JP')}円引き）`
      ).join('　');
    }

    function summarizeCouponUsage(coupons, usedCounts) {
      const sc = toArr(coupons), su = toArr(usedCounts);
      if (!su.length || su.every(v => !v)) return 'なし';
      return sc.map((c, i) => {
        const u = su[i] || 0;
        if (!u) return null;
        return c.type === 'fixed'
          ? `${Number(c.value||0).toLocaleString('ja-JP')}円値引き×${u}`
          : `${Number(c.value||0).toLocaleString('ja-JP')}%OFF×${u}`;
      }).filter(Boolean).join('　');
    }

    function renderResult(result, wallet, coupons, price, mode) {
      const sw = toObj(wallet), sc = toArr(coupons);

      if (!result) {
        resultArea.innerHTML = '<p class="result-placeholder">手持ちの現金とクーポンの組み合わせでは支払えません。</p>';
        return;
      }

      const beforeCount  = totalCount(sw);
      const afterCount   = totalCount(result.afterWallet);
      const beforeTotal  = totalAmount(sw);
      const afterTotal   = totalAmount(result.afterWallet);
      const bcCoupon     = totalCouponCount(sc);
      const acCoupon     = totalCouponCount(result.afterCoupons);
      const countDelta   = afterCount - beforeCount;
      const deltaStr     = countDelta <= 0
        ? `<span style="color:var(--ok)">▼ ${Math.abs(countDelta)}枚</span>`
        : `<span style="color:var(--err)">▲ ${countDelta}枚</span>`;

      const modeLabel = mode === 'coins' ? '小銭を優先的に減らす' : '支払い後の枚数を最小';

      resultArea.innerHTML = `
        <div class="result-animate">

          <div class="summary-strip">
            <div class="stat-block">
              <div class="stat-label">クーポン使用額</div>
              <div class="stat-value">${yen(result.couponAmount)}</div>
              <div class="stat-sub">${describeApplied(result.applied)}</div>
            </div>
            <div class="stat-block">
              <div class="stat-label">現金で払う額</div>
              <div class="stat-value">${yen(result.remainingPrice)}</div>
              <div class="stat-sub">実際に出す現金 ${yen(result.paidAmount)}</div>
            </div>
            <div class="stat-block">
              <div class="stat-label">支払い後の枚数変化</div>
              <div class="stat-value">${afterCount}枚</div>
              <div class="stat-sub">${beforeCount}枚 → ${deltaStr}</div>
            </div>
          </div>

          <div class="result-grid">
            <div class="result-panel">
              <div class="result-panel-title">おすすめの出し方</div>
              <div class="table-wrap"><table>
                <tr><th>支払額</th><td class="mono">${yen(price)}</td></tr>
                <tr><th>使うクーポン</th><td>${summarizeCouponUsage(sc, result.usedCounts)}</td></tr>
                <tr><th>クーポン詳細</th><td>${describeApplied(result.applied)}</td></tr>
                <tr><th>クーポン使用額</th><td class="mono">${yen(result.couponAmount)}</td></tr>
                <tr><th>現金対象額</th><td class="mono">${yen(result.remainingPrice)}</td></tr>
                <tr><th>出す現金の内訳</th><td>${compactCombo(result.paidCombo, DENOMS)}</td></tr>
                <tr><th>お釣り</th><td class="mono">${yen(result.changeAmount)}</td></tr>
                <tr><th>お釣り内訳</th><td>${compactCombo(result.changeCombo, DENOMS)}</td></tr>
                <tr><th>評価モード</th><td>${modeLabel}</td></tr>
              </table></div>
            </div>

            <div class="result-panel">
              <div class="result-panel-title">財布とクーポンの変化</div>
              <div class="table-wrap"><table>
                <tr><th>支払い前の現金枚数</th><td class="mono">${beforeCount}枚</td></tr>
                <tr><th>支払い後の現金枚数</th><td class="mono">${afterCount}枚</td></tr>
                <tr><th>支払い前の現金総額</th><td class="mono">${yen(beforeTotal)}</td></tr>
                <tr><th>支払い後の現金総額</th><td class="mono">${yen(afterTotal)}</td></tr>
                <tr><th>支払い前のクーポン枚数</th><td class="mono">${bcCoupon}枚</td></tr>
                <tr><th>支払い後のクーポン枚数</th><td class="mono">${acCoupon}枚</td></tr>
              </table></div>
            </div>

            <div class="result-panel">
              <div class="result-panel-title">支払い後の財布の中身</div>
              <div class="table-wrap"><table>
                <thead><tr><th>額面</th><th>枚数</th></tr></thead>
                <tbody>
                  ${DENOMS.map(d => `<tr><td>${d.toLocaleString('ja-JP')}円</td><td class="mono">${result.afterWallet[d] || 0}枚</td></tr>`).join('')}
                </tbody>
              </table></div>
            </div>

            <div class="result-panel">
              <div class="result-panel-title">支払い後のクーポン残数</div>
              <div class="table-wrap"><table>
                <thead><tr><th>種別</th><th>残数</th></tr></thead>
                <tbody>
                  ${toArr(result.afterCoupons).length
                    ? toArr(result.afterCoupons).map(c => `<tr><td>${c.type === 'fixed' ? `${Number(c.value||0).toLocaleString('ja-JP')}円値引き` : `${Number(c.value||0).toLocaleString('ja-JP')}%OFF`}</td><td class="mono">${c.count}枚</td></tr>`).join('')
                    : '<tr><td colspan="2">なし</td></tr>'}
                </tbody>
              </table></div>
            </div>
          </div>

        </div>`;
    }

    /* ─────────────────────────────────────────
       内部テスト
    ───────────────────────────────────────── */
    function assert(name, ok, detail = '') {
      return { name, ok: Boolean(ok), detail };
    }

    function runTests() {
      const R = [];

      R.push(assert('totalCountはundefinedで0',   totalCount(undefined) === 0));
      R.push(assert('totalCouponCountはundefinedで0', totalCouponCount(undefined) === 0));

      const fp = enumerateCouponPlans([{ type: 'fixed', value: 500, count: 1 }], 1200);
      R.push(assert('固定クーポン候補生成', fp.some(p => p.discount === 500), `plans=${fp.length}`));

      const pp = enumerateCouponPlans([{ type: 'percent', value: 10, count: 1 }], 1000);
      R.push(assert('10%クーポン候補生成', pp.some(p => p.discount === 100), JSON.stringify(pp)));

      R.push(assert('coinCountは硬貨のみ', coinCount({1000:2,50:1,1:5}) === 6));
      R.push(assert('billCountは紙幣のみ', billCount({10000:1,1000:2,50:1,1:5}) === 3));

      const nb = findBest(
        {10000:0,5000:0,2000:0,1000:1,500:0,100:3,50:0,10:1,5:0,1:0},
        [{type:'fixed',value:100,count:1}],
        1110, 'count'
      );
      R.push(assert('通常ケース結果あり', !!nb, nb ? `paid=${nb.paidAmount}` : 'null'));

      const scoreA = judgeCandidate({
        afterWallet:{1000:1}, afterCoupons:[], paidCombo:{5000:1,1000:1,100:2,10:4,1:1},
        usedCounts:[], paidAmount:6241, changeAmount:1005
      }, 'count');
      const scoreB = judgeCandidate({
        afterWallet:{1000:1}, afterCoupons:[], paidCombo:{5000:1,1000:2,100:2,10:4,1:1},
        usedCounts:[], paidAmount:7241, changeAmount:2005
      }, 'count');
      R.push(assert('6241円 < 7241円を優先', compareTuple(scoreA, scoreB) < 0));

      const s4ones = judgeCandidate({
        afterWallet:{1000:2,1:4}, afterCoupons:[], paidCombo:{1000:5,100:2,10:4},
        usedCounts:[], paidAmount:5240, changeAmount:4
      }, 'count');
      const s1five = judgeCandidate({
        afterWallet:{1000:2,5:1}, afterCoupons:[], paidCombo:{1000:5,100:2,10:3,1:6},
        usedCounts:[], paidAmount:5241, changeAmount:5
      }, 'count');
      R.push(assert('4円より5円釣り（5円玉1枚）を優先', compareTuple(s1five, s4ones) < 0));

      const sMore = judgeCandidate({
        afterWallet:{1000:2,50:1,1:5}, afterCoupons:[], paidCombo:{5000:1},
        usedCounts:[], paidAmount:6000, changeAmount:0
      }, 'count');
      const sFew = judgeCandidate({
        afterWallet:{1000:2,100:1,10:1}, afterCoupons:[], paidCombo:{5000:1},
        usedCounts:[], paidAmount:6000, changeAmount:0
      }, 'count');
      R.push(assert('硬貨枚数が少ない方を優先', compareTuple(sFew, sMore) < 0));

      const fail = R.filter(r => !r.ok).length;
      testArea.innerHTML = R.map(r =>
        `${r.ok ? '<span style="color:var(--ok)">✓</span>' : '<span style="color:var(--err)">✗</span>'} ${r.name}${r.detail ? ` — ${r.detail}` : ''}`
      ).join('<br>');

      if (fail > 0) console.warn(`Internal tests: ${fail} failed`, R.filter(r => !r.ok));

      return R;
    }

    /* ─────────────────────────────────────────
       イベント
    ───────────────────────────────────────── */
    /* ── モード説明文 ── */
    const MODE_DESC = {
      coins: '🪙 手持ちの小銭をなるべく多く使い、財布の硬貨枚数を減らします。じゃらじゃらした小銭を解消したいときに。',
      count: '👛 支払い後に財布に残る枚数（紙幣＋硬貨）が最も少なくなる組み合わせを選びます。財布全体をスッキリさせたいときに。'
    };

    function updateModeDesc() {
      const mode = $('mode')?.value ?? 'coins';
      const desc = $('modeDesc');
      if (desc) desc.textContent = MODE_DESC[mode] ?? '';
    }

    $('mode').addEventListener('change', updateModeDesc);
    updateModeDesc(); // 初期表示

    $('calcBtn').addEventListener('click', () => {
      clearStatus();
      const price  = readIntById('price');
      const mode   = $('mode')?.value ?? 'count';
      const wallet = getWallet();
      const coupons = getCoupons();
      const result = findBest(wallet, coupons, price, mode);
      renderResult(result, wallet, coupons, price, mode);
    });

    $('sampleBtn').addEventListener('click', () => {
      $('price').value = 1287;
      renderMoneyInputs({10000:1,5000:0,2000:1,1000:3,500:2,100:4,50:1,10:6,5:0,1:3});
      renderCouponInputs([
        {type:'fixed',value:500,count:1},
        {type:'fixed',value:100,count:1},
        {type:'percent',value:10,count:1},
        {type:'fixed',value:0,count:0},
        {type:'fixed',value:0,count:0}
      ]);
      resultArea.innerHTML = '<p class="result-placeholder">サンプルを入れました。「計算する」を押してください。</p>';
      clearStatus();
    });

    $('clearBtn').addEventListener('click', () => {
      $('price').value = 0;
      renderMoneyInputs();
      renderCouponInputs();
      resultArea.innerHTML = '<p class="result-placeholder">入力をリセットしました。</p>';
      clearStatus();
    });

    // フォーカスアウト時に入力値を正規化（イベントデリゲーション）
    document.addEventListener('focusout', e => {
      const t = e.target;
      if (t.tagName !== 'INPUT' || t.type !== 'number') return;
      readInt(t); // 副作用で正規化
    });

    /* ─────────────────────────────────────────
       初期化
    ───────────────────────────────────────── */
    renderMoneyInputs();
    renderCouponInputs();

    /* ─────────────────────────────────────────
       テンキー
    ───────────────────────────────────────── */
    (function () {
      const overlay  = document.getElementById('numpad-overlay');
      const numpad   = document.getElementById('numpad');
      const display  = document.getElementById('numpad-display');
      const labelEl  = document.getElementById('numpad-label');

      let targetInput = null;
      let buf = '';

      function updateDisplay() {
        const v = buf === '' ? '0' : buf;
        display.textContent = Number(v).toLocaleString('ja-JP');
        display.classList.toggle('is-zero', buf === '' || buf === '0');
      }

      function open(input) {
        targetInput = input;
        buf = input.value === '0' || input.value === '' ? '' : input.value;
        // ラベルは input の直前の label テキストを使う
        const lbl = input.closest('.field')?.querySelector('label')?.textContent?.trim()
          || input.labels?.[0]?.textContent?.trim()
          || '入力';
        labelEl.textContent = lbl;
        updateDisplay();
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function close() {
        overlay.classList.remove('open');
        document.body.style.overflow = '';
        targetInput = null;
      }

      function commit() {
        if (targetInput) {
          const v = buf === '' ? 0 : Math.max(0, Math.floor(Number(buf)));
          targetInput.value = String(v);
          // focusout 正規化を手動トリガー
          targetInput.dispatchEvent(new Event('change', { bubbles: true }));
        }
        close();
      }

      // 数字キーの押下
      overlay.addEventListener('click', e => {
        const k = e.target.closest('[data-k]')?.dataset?.k;
        if (!k) return;

        // 押下フィードバック
        const btn = e.target.closest('[data-k]');
        btn.classList.add('pressed');
        setTimeout(() => btn.classList.remove('pressed'), 120);

        if (k === 'ok')    { commit(); return; }
        if (k === 'clear') { buf = ''; updateDisplay(); return; }
        if (k === 'del')   { buf = buf.slice(0, -1); updateDisplay(); return; }

        // 先頭ゼロを除去、上限10桁
        if (buf.length >= 10) return;
        if (buf === '0') buf = k;
        else buf += k;
        updateDisplay();
      });

      // オーバーレイ背景クリックで閉じる（numpad 本体は除外）
      overlay.addEventListener('click', e => {
        if (e.target === overlay) commit();
      });

      // タッチデバイス（スマホ・タブレット）かどうかを判定
      const isTouchDevice = () =>
        navigator.maxTouchPoints > 0 &&
        /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

      // すべての number input にテンキーを紐付け
      // タッチデバイスのみ有効。PCはキーボード入力をそのまま使う
      function bindAll() {
        if (!isTouchDevice()) return; // PC はスキップ
        document.querySelectorAll('input[type="number"]').forEach(inp => {
          // 重複登録防止
          if (inp.dataset.numpadBound) return;
          inp.dataset.numpadBound = '1';
          inp.addEventListener('focus', e => {
            e.preventDefault();
            inp.blur(); // ソフトキーボードを抑制
            open(inp);
          });
          inp.addEventListener('click', e => {
            e.preventDefault();
            open(inp);
          });
        });
      }

      // renderMoneyInputs / renderCouponInputs を wrap してバインドし直す
      const _origMoney  = window._renderMoneyInputs  || renderMoneyInputs;
      const _origCoupon = window._renderCouponInputs || renderCouponInputs;

      // MutationObserver で DOM 変化を検知して自動バインド
      const mo = new MutationObserver(() => bindAll());
      mo.observe(document.body, { childList: true, subtree: true });

      // 初回バインド（初期化後に実行）
      setTimeout(bindAll, 0);
    })();

    runTests();
  </script>
